<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Midterm Project</title>
</head>
<body>
    <!-- Creating the header of the page, wich contains the logo and the navigation menu, after probably I will have to add an ID or Class to style on CSS -->
    <header>
        <img src="images/my-coffee-shop-logo.svg" alt="Coffee Shop Logo with two coffee beans and the name of the company called My Coffee Shop">
        <nav>
            <ul>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">Locations</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Section: when I will put the entire content of the page -->
     <main>
        <!-- This 1st section: it will be the banner of the page including the image, title, paragraph and the button -->
        <section class="banner">
        <img src="images/hero-background.jpg" alt="A woman with a yellow touque smilling while using a coffee machine">
        <!-- h1 is for the banner of the page, which is the biggest sentence of the page that's why is h1 to maintain the hierarchy -->
        <h1>Experience coffee like never before</h1>
        <p>We craft more than beverages; we curate memories, one flavorful moment at a time. Embrace the aroma and let every visit be a chapter in your coffee story.</p>
        <a href="#" class="button-banner">Explore our menu</a>
        </section>
     </main>
</body>
</html>
